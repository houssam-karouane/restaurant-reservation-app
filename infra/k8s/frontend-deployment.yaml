apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: restaurant-app
  labels:
    app: frontend
    app.kubernetes.io/part-of: restaurant-reservation-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: restaurant-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          # nginx.conf proxy_pass utilise http://backend:8000 — c'est
          # pourquoi le Service backend doit s'appeler exactement "backend"
          # dans le même namespace.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
