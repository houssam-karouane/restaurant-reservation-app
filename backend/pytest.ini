[pytest]
testpaths = tests
python_files = test_*.py
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:fastapi.*
addopts =
    --strict-markers
    --tb=short
    -ra
    --cov=app
    --cov-branch
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-fail-under=70
