services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://dev:devpassword@postgres:5432/restaurant
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=dev-secret-change-me-in-prod
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - restaurant-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurant-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - restaurant-net

  postgres:
    image: postgres:16-alpine
    container_name: restaurant-postgres
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_DB=restaurant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d restaurant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant-net

  redis:
    image: redis:7-alpine
    container_name: restaurant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant-net

  vector:
    image: timberio/vector:latest-alpine
    container_name: restaurant-vector
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/monitoring/vector.toml:/etc/vector/vector.toml:ro
    depends_on:
      - backend
      - frontend
    networks:
      - restaurant-net

  zabbix-db:
    image: postgres:16-alpine
    container_name: zabbix-postgres
    environment:
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix
      - POSTGRES_DB=zabbix
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabbix -d zabbix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant-net

  zabbix-server-pgsql:
    image: zabbix/zabbix-server-pgsql:latest
    container_name: zabbix-server
    ports:
      - "10051:10051"
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix
      - POSTGRES_DB=zabbix
    depends_on:
      zabbix-db:
        condition: service_healthy
    networks:
      - restaurant-net

  zabbix-web-nginx-pgsql:
    image: zabbix/zabbix-web-nginx-pgsql:latest
    container_name: zabbix-web
    ports:
      - "8080:8080"
    environment:
      - ZBX_SERVER_HOST=zabbix-server-pgsql
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix
      - POSTGRES_DB=zabbix
      - PHP_TZ=Europe/Paris
    depends_on:
      - zabbix-server-pgsql
      - zabbix-db
    networks:
      - restaurant-net

  zabbix-agent:
    image: zabbix/zabbix-agent:latest
    container_name: zabbix-agent
    environment:
      - ZBX_HOSTNAME=Zabbix server
      - ZBX_SERVER_HOST=zabbix-server-pgsql
    networks:
      - restaurant-net

volumes:
  postgres-data:
  redis-data:
  zabbix-db-data:

networks:
  restaurant-net:
    driver: bridge
