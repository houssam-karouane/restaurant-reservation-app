<article class="restaurant-card">
  <div class="restaurant-card__image" aria-hidden="true">
    <span class="restaurant-card__image-text">{{ restaurant.name.charAt(0) }}</span>
  </div>
  <div class="restaurant-card__body">
    <h3 class="restaurant-card__name">{{ restaurant.name }}</h3>
    <p class="restaurant-card__meta">
      <span class="restaurant-card__rating">⭐ {{ ratingLabel(restaurant.rating) }}</span>
      @if (restaurant.review_count > 0) {
        <span class="restaurant-card__reviews">({{ restaurant.review_count }})</span>
      }
    </p>
    <p class="restaurant-card__cuisine">{{ restaurant.cuisine }}</p>
    <p class="restaurant-card__price">{{ priceLabel(restaurant.price_range) }}</p>
    @if (restaurant.city) {
      <p class="restaurant-card__city">{{ restaurant.city }}</p>
    }
  </div>
</article>
