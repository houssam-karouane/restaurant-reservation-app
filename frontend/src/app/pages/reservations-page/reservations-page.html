<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-8">
  <div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-lg shadow-xl p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-8">My Reservations</h1>

      <div *ngIf="loading" class="text-center py-8">
        <p class="text-gray-500">Loading reservations...</p>
      </div>

      <div *ngIf="!loading && reservations.length === 0" class="text-center py-8">
        <p class="text-gray-500">You have no reservations yet.</p>
      </div>

      <div *ngIf="!loading && reservations.length > 0" class="space-y-4">
        <div *ngFor="let reservation of reservations" class="border border-gray-200 rounded-lg p-4">
          <!-- Reservation details will go here -->
        </div>
      </div>
    </div>
  </div>
</div>
