server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    server_tokens off;

    # CRITIQUE : sans ça, nginx redirige /auth/register vers
    # http://host/auth/register/ (sans le port) parce qu'il utilise son
    # propre port d'écoute (80) plutôt que celui du Host header (4200
    # côté host Docker). Cypress suit le redirect → ECONNREFUSED.
    # Avec absolute_redirect off, le Location renvoyé est relatif et
    # le client conserve le host:port d'origine.
    absolute_redirect off;

    # Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Angular routing - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}